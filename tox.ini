[tox]
envlist = py311-{lint,invalidcode},py311-black-{run,check}

[testenv]
skip_install=True
deps =
  py313-{lint,invalidcode}: flake8
  py313-black-{run,check}: black
  py313-mypy: mypy >= 0.900
commands =
        py313-lint: flake8 src doc maintenance tests --ignore E402,E501,E203,W503,E741 --exclude src/tests,src/vendor
        py313-invalidcode: flake8 src bin maintenance --exclude src/tests,src/vendor --select F,E722,W605
        py313-black-check: black --check --diff bin src doc maintenance tests
        py313-black-run: black bin src doc maintenance tests
        py313-mypy: mypy --ignore-missing-import --install-types --non-interactive --follow-imports silent src/ --exclude (acme_tiny|migrations|tests)
